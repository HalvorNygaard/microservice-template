name: Publish template

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test service
        run: dotnet test MicroserviceTemplate.slnx

      - name: Test template generation
        run: dotnet test tests/TemplateValidation.Tests/TemplateValidation.Tests.csproj

      - name: Pack template
        run: dotnet pack -c Release template/microservice-template.Template.csproj /p:PackageVersion=1.0.${{ github.run_number }}

      - name: Publish to GitHub Packages
        run: dotnet nuget push "template/bin/Release/ModernMicroservice.Template.*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate

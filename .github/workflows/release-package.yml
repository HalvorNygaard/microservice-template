name: Release package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, for example 1.0.0
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build MicroserviceTemplate.slnx

      - name: Test service
        run: dotnet test --solution MicroserviceTemplate.slnx --no-build

      - name: Test template generation
        run: dotnet test --project tests/TemplateValidation.Tests/TemplateValidation.Tests.csproj

      - name: Pack template
        run: dotnet pack -c Release template/microservice-template.Template.csproj /p:PackageVersion=${{ inputs.version }}

      - name: Publish to GitHub Packages
        run: dotnet nuget push "template/bin/Release/ModernMicroservice.Template.${{ inputs.version }}.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
